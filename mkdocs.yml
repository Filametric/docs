site_name: Filametric Docs
site_url: https://docs.filametric.com
site_description: Documentation for the Filametric DryBase
site_author: Filametric B.V.

repo_url: https://github.com/filametric/docs
repo_name: filametric/docs

copyright: Copyright &copy; 2026 Filametric B.V.

theme:
  name: material
  logo: images/logo.svg
  favicon: images/favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
      type: date

nav:
  - Home: index.md
  - Assembly Manual:
    - Introduction: manual/introduction.md
    - "1. Unboxing & checklist": manual/chapter-1-unboxing.md
    - "2. Preparing the housing": manual/chapter-2-preparing-housing.md
    - "3. Housing assembly": manual/chapter-3-housing-assembly.md
    - "4. Heating unit assembly": manual/chapter-4-heating-unit-assembly.md
    - "5. DryBase assembly": manual/chapter-5-drybase-assembly.md
    - "6. Drybox assembly": manual/chapter-6-drybox-assembly.md
  - 3D Printing:
    - Overview: 3d-printing/guide.md
    - DryBase Housing: 3d-printing/housing.md
  - DryBase Firmware:
    - Overview: firmware/overview.md
    - Getting Started: firmware/getting-started.md
    - Updating: firmware/updating.md
    - Changelog: firmware/changelog.md
  - Filametric Studio:
    - Overview: studio/overview.md
    - Getting Started: studio/getting-started.md
    - Download: studio/download.md
  - Troubleshooting:
    - DryBase: troubleshooting/drybase.md
    - Filametric Studio: troubleshooting/filametric-studio.md
  - Support:
    - FAQ: support/faq.md
    - Contact: support/contact.md

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/filametric
      name: Filametric on Discord
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/filametric
      name: Filametric on Instagram
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@filametric
      name: Filametric on YouTube
