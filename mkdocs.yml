site_name: Filametric Docs
site_url: https://docs.filametric.com
site_description: Assembly instructions and documentation for the Filametric DryBase
site_author: Filametric B.V.

repo_url: https://github.com/filametric/docs
repo_name: filametric/docs

copyright: Copyright &copy; 2026 Filametric B.V.

theme:
  name: material
  # logo: images/filametric-logo.png       # Uncomment and add your logo
  # favicon: images/favicon.png             # Uncomment and add your favicon
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Assembly Manual:
    - Introduction: manual/introduction.md
    - Chapter 1 — Before You Start: manual/chapter-1-before-you-start.md
    - Chapter 2 — 3D Printing: manual/chapter-2-3d-printing.md
    - Chapter 3 — Housing Assembly: manual/chapter-3-housing-assembly.md
    - Chapter 4 — Heating Unit Assembly: manual/chapter-4-heating-unit-assembly.md
    - Chapter 5 — DryBase Assembly: manual/chapter-5-drybase-assembly.md
    - Chapter 6 — Drybox Assembly: manual/chapter-6-drybox-assembly.md
  - Filametric Studio:
    - Overview: studio/overview.md
    - Download: studio/download.md
  - Support:
    - FAQ: support/faq.md
    - Contact: support/contact.md

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/filametric
      name: Filametric on Discord
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/filametric
      name: Filametric on Instagram
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@filametric
      name: Filametric on YouTube
